    <style>
        :root {
            --primary: #00ff37;
            --bg-light: #8bdf80;
            --dark-green: #009e42;
            --mint: #72ff77;
            --white: #ffffff;
            --whatsapp: #25d366;
            --nav-height: 160px; 
        }

        /* EVITA EL TEMBLOR: Forzar scrollbar y suavizar renderizado */
        html { 
            overflow-y: scroll; 
            scroll-behavior: smooth;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: var(--bg-light); 
            padding-top: var(--nav-height); 
            color: #333;
            -webkit-font-smoothing: antialiased;
        }

        /* --- NAVBAR --- */
        nav {
            position: fixed; top: 0; left: 0; width: 100%; height: var(--nav-height);
            background: var(--white); display: flex; justify-content: center; align-items: center;
            z-index: 2000; border-bottom: 4px solid var(--primary);
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }
        
        /* Dimensiones fijas para evitar saltos de diseño */
        .logo-container img { 
            height: 120px; 
            width: auto; 
            min-width: 120px;
            object-fit: contain; 
        }

        /* --- BUSCADOR --- */
        .search-area { padding: 40px 20px; text-align: center; }
        #menuSearch {
            width: 90%; max-width: 500px; padding: 15px 25px; border-radius: 50px;
            border: 2px solid var(--mint); outline: none; font-size: 1rem;
            transition: border-color 0.3s; 
        }
        #menuSearch:focus { border-color: var(--primary); }

        /* --- GRID --- */
        .container { max-width: 1200px; margin: 0 auto 80px; padding: 0 20px; }
        .menu-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 30px; 
        }

        /* Tarjetas con optimización de animación */
        .card {
            background: var(--white); border-radius: 25px; overflow: hidden;
            transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94), box-shadow 0.3s;
            cursor: pointer; border: 1px solid #eee;
            backface-visibility: hidden; /* Evita vibración en Chrome/Safari */
        }
        .card:hover { 
            transform: translateY(-8px); 
            box-shadow: 0 15px 30px rgba(0,0,0,0.1); 
        }
        .card img { width: 100%; height: 220px; object-fit: cover; background: #f0f0f0; }
        .card-info { padding: 20px; text-align: center; }
        .card-info h3 { font-family: 'Playfair Display'; font-size: 1.4rem; color: var(--dark-green); }
        .price { font-weight: 700; color: var(--dark-green); font-size: 1.2rem; margin-top: 10px; }

        /* --- MODAL --- */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 3000;
            justify-content: center; align-items: center; padding: 20px;
        }
        .modal.active { display: flex; }
        .modal-box { 
            background: var(--white); max-width: 500px; width: 100%; 
            border-radius: 30px; overflow: hidden; position: relative;
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        
        .close { position: absolute; top: 15px; right: 20px; font-size: 35px; color: white; cursor: pointer; z-index: 10; }
        .modal-body { padding: 30px; }
        .details-box { 
            background: #f1fbf1; padding: 20px; border-radius: 20px; 
            margin: 20px 0; border-left: 5px solid var(--primary);
        }
        .btn-wa {
            display: block; background: var(--whatsapp); color: white; text-align: center;
            padding: 18px; text-decoration: none; font-weight: 600; border-radius: 50px;
        }
    </style>
</head>

        function render(lista = platillos) {
            const grid = document.getElementById('grid');
            grid.innerHTML = lista.map(p => {
                const src = p.imagen ? (DIR_IMG + p.imagen) : IMG_FALLBACK;
                return `
                <div class="card" onclick="openModal('${p.nombre}')">
                    <img src="${src}" alt="${p.nombre}" onerror="this.src='${IMG_FALLBACK}'">
                    <div class="card-info">
                        <h3>${p.nombre}</h3>
                        <p class="price">${p.precio}</p>
                    </div>
                </div>
            `}).join('');
        }

        function openModal(nombre) {
            const p = platillos.find(item => item.nombre === nombre);
            if(!p) return;
            document.getElementById('m-img').src = p.imagen ? (DIR_IMG + p.imagen) : IMG_FALLBACK;
            document.getElementById('m-title').innerText = p.nombre;
            document.getElementById('m-desc').innerText = p.descripcion;
            document.getElementById('m-ing').innerText = p.ingredientes;
            document.getElementById('m-time').innerText = p.tiempo;
            document.getElementById('m-xtra').innerText = p.extra;
            
            

            
            document.getElementById('m-wa').href = `https://wa.me/${TEL_WHATSAPP}?text=Hola! Quiero pedir: ${p.nombre}`;
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() { document.getElementById('modal').classList.remove('active'); }

        document.getElementById('menuSearch').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filtrados = platillos.filter(p => 
                p.nombre.toLowerCase().includes(val) || 
                p.ingredientes.toLowerCase().includes(val)
            );
            render(filtrados);
        });

        render();
