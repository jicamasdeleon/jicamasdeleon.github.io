<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menú | Jicamas de Leon</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #00ff37;
            --bg-light: #8bdf80;
            --dark-green: #009e42;
            --mint: #72ff77;
            --white: #ffffff;
            --whatsapp: #25d366;
            --text-dark: #2c3e50;
            --nav-height: 140px; 
        }

        html { 
            overflow-y: scroll; 
            scroll-behavior: smooth;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: var(--bg-light); 
            padding-top: var(--nav-height); 
            color: var(--text-dark);
            -webkit-font-smoothing: antialiased;
        }

        /* --- NAVBAR --- */
        nav {
            position: fixed; top: 0; left: 0; width: 100%; height: var(--nav-height);
            background: var(--white); display: flex; justify-content: center; align-items: center;
            z-index: 2000; border-bottom: 5px solid var(--primary);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            transition: height 0.3s ease;
        }
        
        .logo-container img { 
            height: 110px; 
            width: auto; 
            object-fit: contain; 
            transition: all 0.3s ease;
        }
        .logo-container img:hover { transform: scale(1.05); }

        /* --- TÍTULO DE SUCURSAL --- */
        .branch-title {
            text-align: center;
            padding: 40px 20px 20px;
        }
        .branch-title h2 {
            font-family: 'Playfair Display', serif;
            color: var(--dark-green);
            font-size: 2.2rem;
            margin: 0;
            position: relative;
            display: inline-block;
        }
        .branch-title h2::after {
            content: '';
            position: absolute;
            width: 50%;
            height: 4px;
            background: var(--primary);
            bottom: -8px;
            left: 25%;
            border-radius: 5px;
        }

        /* --- BARRA DE CATEGORÍAS --- */
        .categories-nav {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
            padding: 0 20px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        
        .btn-category {
            background: var(--white);
            color: var(--dark-green);
            border: 2px solid var(--mint);
            padding: 10px 25px;
            border-radius: 50px;
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.95rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        
        .btn-category:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
        }
        
        .btn-category.active {
            background: var(--dark-green);
            color: var(--white);
            border-color: var(--dark-green);
            box-shadow: 0 6px 15px rgba(0, 158, 66, 0.3);
        }

        /* --- BOTÓN ESPECIALIDADES --- */
        .btn-category.btn-especial {
            background-color: #ffea00; 
            color: #000; 
            border-color: #ffea00;
            font-size: 1.1rem; 
            padding: 12px 30px; 
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(255, 234, 0, 0.4);
        }
        .btn-category.btn-especial:hover {
            background-color: #ffd000;
            border-color: #ffd000;
            transform: translateY(-3px) scale(1.03);
        }
        .btn-category.btn-especial.active {
            background-color: var(--dark-green);
            color: var(--white);
            border-color: var(--dark-green);
            box-shadow: 0 6px 15px rgba(0, 158, 66, 0.3);
        }

        /* --- GRID --- */
        .container { max-width: 1200px; margin: 0 auto 80px; padding: 0 20px; }
        .menu-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 35px; 
        }

        /* --- TARJETAS PRO --- */
        .card {
            background: var(--white); border-radius: 20px; overflow: hidden;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            cursor: pointer; 
            border: 1px solid rgba(0,0,0,0.03);
            box-shadow: 0 10px 20px rgba(0,0,0,0.04);
            display: flex;
            flex-direction: column;
        }
        .card:hover { 
            transform: translateY(-10px); 
            box-shadow: 0 15px 35px rgba(0, 158, 66, 0.15); 
        }
        .img-container {
            width: 100%; height: 240px; overflow: hidden; background: #f8f9fa;
        }
        .card img { 
            width: 100%; height: 100%; object-fit: cover; 
            transition: transform 0.5s ease;
        }
        .card:hover img { transform: scale(1.08); }
        
        .card-info { padding: 25px 20px; text-align: center; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between;}
        .card-info h3 { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--dark-green); margin-bottom: 10px; line-height: 1.2;}
        .price { 
            display: inline-block;
            font-weight: 600; color: var(--dark-green); font-size: 1.1rem; 
            background: rgba(114, 255, 119, 0.2);
            padding: 8px 15px; border-radius: 50px;
            margin-top: auto;
        }

        /* --- MODAL PRO --- */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); z-index: 3000;
            justify-content: center; align-items: center; padding: 20px;
        }
        .modal.active { display: flex; animation: modalBgFade 0.3s ease-out forwards; }
        
        @keyframes modalBgFade { from { opacity: 0; } to { opacity: 1; } }

        .modal-box { 
            background: var(--white); max-width: 550px; width: 100%; 
            border-radius: 25px; overflow: hidden; position: relative;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0; transform: translateY(30px);
        }
        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }
        
        .close { 
            position: absolute; top: 15px; right: 20px; 
            width: 40px; height: 40px; background: rgba(0,0,0,0.5);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            font-size: 28px; color: white; cursor: pointer; z-index: 10;
            transition: background 0.3s; line-height: 1;
        }
        .close:hover { background: var(--dark-green); }
        
        .modal-body { padding: 35px 30px; }
        .modal-body h2 { font-family: 'Playfair Display', serif; color: var(--dark-green); font-size: 2rem; margin-bottom: 5px;}
        #m-desc { color: #666; font-size: 1rem; margin-bottom: 25px; font-weight: 300; }
        
        .info-grid { display: grid; gap: 15px; margin-bottom: 30px; }
        .info-item {
            background: rgba(114, 255, 119, 0.1);
            padding: 15px; border-radius: 15px;
            display: flex; align-items: flex-start; gap: 15px;
            border-left: 4px solid var(--primary);
        }
        .info-item span.icon { font-size: 1.5rem; line-height: 1; }
        .info-item strong { color: var(--dark-green); display: block; margin-bottom: 4px; font-size: 0.95rem; }
        .info-item p { margin: 0; font-size: 0.9rem; color: var(--text-dark); line-height: 1.4; }

        .btn-wa {
            display: flex; justify-content: center; align-items: center; gap: 10px;
            background: var(--whatsapp); color: white; text-align: center;
            padding: 18px; text-decoration: none; font-size: 1.1rem; font-weight: 600; 
            border-radius: 50px; transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.3);
        }
        .btn-wa:hover { background: #1ebe57; transform: translateY(-3px); box-shadow: 0 15px 25px rgba(37, 211, 102, 0.4); }

        /* --- BOTÓN FLOTANTE UBICACIÓN --- */
        .btn-location {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--white);
            color: var(--dark-green);
            width: 65px;
            height: 65px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            z-index: 1000;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            border: 3px solid var(--primary);
            text-decoration: none;
        }
        .btn-location:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 30px rgba(0, 158, 66, 0.3);
            background: var(--dark-green);
            color: var(--white);
            border-color: var(--dark-green);
        }
        .btn-location svg {
            width: 32px;
            height: 32px;
            transition: fill 0.3s;
        }
        .btn-location::before {
            content: "📍 Ver ubicación";
            position: absolute;
            right: 85px;
            background: var(--dark-green);
            color: white;
            padding: 10px 18px;
            border-radius: 10px;
            font-size: 0.95rem;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            white-space: nowrap;
            font-weight: 500;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .btn-location:hover::before {
            opacity: 1;
            visibility: visible;
            transform: translateX(-5px);
        }

        /* =========================================
           --- RESPONSIVIDAD (Móviles y Tablets) --- 
           ========================================= */
        @media (max-width: 768px) {
            :root {
                --nav-height: 100px; /* Barra superior más delgada en celulares */
            }
            .logo-container img { height: 70px; } /* Logo más pequeño */
            
            .branch-title { padding: 20px 20px 15px; }
            .branch-title h2 { font-size: 1.8rem; }
            
            .categories-nav { gap: 8px; margin-bottom: 30px; }
            .btn-category { padding: 8px 18px; font-size: 0.85rem; }
            .btn-category.btn-especial { padding: 10px 22px; font-size: 0.95rem; }
            
            .menu-grid { 
                /* Fuerza las tarjetas a ocupar el 100% del ancho (1 columna) en celulares */
                grid-template-columns: repeat(auto-fill, minmax(100%, 1fr)); 
                gap: 25px; 
            }
            .img-container { height: 200px; } /* Imágenes un poco más compactas */
            .card-info h3 { font-size: 1.3rem; }
            
            /* Ajustes para que la ventana Modal no se desborde en pantallas pequeñas */
            .modal { padding: 15px; }
            .modal-box { 
                max-height: 95vh; /* Máximo 95% del alto de la pantalla */
                display: flex;
                flex-direction: column;
                border-radius: 20px;
            }
            #m-img { height: 180px !important; } /* Imágen del modal más bajita */
            .modal-body { 
                overflow-y: auto; /* Permite deslizar si hay mucho texto */
                padding: 20px 20px 25px; 
            }
            .modal-body h2 { font-size: 1.6rem; }
            #m-desc { font-size: 0.9rem; margin-bottom: 20px; }
            .info-grid { gap: 10px; margin-bottom: 20px; }
            .info-item { padding: 12px; gap: 10px; border-radius: 12px; }
            .info-item span.icon { font-size: 1.3rem; }
            .info-item strong { font-size: 0.9rem; }
            .info-item p { font-size: 0.85rem; }
            .btn-wa { padding: 15px; font-size: 1rem; }
            
            .close { top: 10px; right: 10px; width: 35px; height: 35px; font-size: 24px; }
            
            /* Ajustes del botón flotante */
            .btn-location {
                width: 55px; height: 55px;
                bottom: 20px; right: 20px;
            }
            .btn-location svg { width: 26px; height: 26px; }
            .btn-location::before { display: none; } /* Ocultamos el letrerito en celulares para que no estorbe */
        }
    </style>
</head>

        function render(lista = platillos) {
            const grid = document.getElementById('grid');
            grid.innerHTML = lista.map(p => {
                const src = p.imagen ? (DIR_IMG + p.imagen) : IMG_FALLBACK;
                return `
                <div class="card" onclick="openModal('${p.nombre}')">
                    <div class="img-container">
                        <img src="${src}" alt="${p.nombre}" onerror="this.src='${IMG_FALLBACK}'">
                    </div>
                    <div class="card-info">
                        <h3>${p.nombre}</h3>
                        <span class="price">${p.precio}</span>
                    </div>
                </div>
            `}).join('');
        }

        function filtrarCategoria(tipo, botonRef) {
            document.querySelectorAll('.btn-category').forEach(btn => btn.classList.remove('active'));
            botonRef.classList.add('active');
            
            if (tipo === 'todos') {
                render(platillos);
            } else {
                const filtrados = platillos.filter(p => p.categoria === tipo);
                render(filtrados);
            }
        }

        function openModal(nombre) {
            const p = platillos.find(item => item.nombre === nombre);
            if(!p) return;
            document.getElementById('m-img').src = p.imagen ? (DIR_IMG + p.imagen) : IMG_FALLBACK;
            document.getElementById('m-title').innerText = p.nombre;
            document.getElementById('m-desc').innerText = p.descripcion;
            document.getElementById('m-ing').innerText = p.ingredientes;
            document.getElementById('m-time').innerText = p.tiempo;
            document.getElementById('m-xtra').innerText = p.extra ? p.extra : "No aplica";
            
            document.getElementById('m-wa').href = `https://wa.me/${TEL_WHATSAPP}?text=Hola! Quiero pedir: ${p.nombre}`;
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() { document.getElementById('modal').classList.remove('active'); }

        render();
    </script>
