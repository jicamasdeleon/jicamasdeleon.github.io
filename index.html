<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Sergio | Logo Impactante</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-green: #3cf352;
            --mint: #a5d6a7;
            --dark-green: #007900;
            --white: #ffffff;
            --whatsapp: #25d366;
            /* ALTURA DE LA BARRA (Aumentada para el logo) */
            --nav-height: 180px; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg-green); color: var(--dark-green); padding-top: var(--nav-height); }

        /* --- NAVBAR Y LOGO --- */
        nav {
            position: fixed; top: 0; left: 0; width: 100%; height: var(--nav-height);
            background: var(--bg-green); display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 2000;
            border-bottom: 3px solid var(--mint); box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            padding: 10px 0;
        }

        .logo-container {
            height: 170px; /* AQUÍ CONTROLAS EL TAMAÑO DEL LOGO */
            margin-bottom: 2px;
            display: flex;
            justify-content: center;
        }

        .logo-img {
            height: 100%;
            width: auto;
            object-fit: contain;
            /* Filtro opcional para dar sombra suave al logo */
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); 
        }

        .brand-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 700;
        }

        /* --- BUSCADOR --- */
        .search-area { padding: 40px 20px; text-align: center; }
        #menuSearch {
            width: 90%; max-width: 550px; padding: 18px 30px; border-radius: 50px;
            border: 2px solid var(--mint); outline: none; font-size: 1.1rem; 
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }

        /* --- CUADRÍCULA --- */
        .container { max-width: 1200px; margin: 0 auto 80px; padding: 0 20px; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }

        .card {
            background: var(--white); border-radius: 25px; overflow: hidden; 
            border: 1px solid rgba(165, 214, 167, 0.3); cursor: pointer; transition: 0.3s ease;
        }
        .card:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); border-color: var(--dark-green); }
        .card img { width: 100%; height: 240px; object-fit: cover; }
        .card-info { padding: 25px; text-align: center; }

        /* --- MODAL --- */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 3000;
            justify-content: center; align-items: center; padding: 20px;
        }
        .modal-box { background: var(--white); max-width: 550px; width: 100%; border-radius: 30px; overflow: hidden; position: relative; }
        .close { position: absolute; top: 15px; right: 25px; font-size: 40px; color: white; cursor: pointer; z-index: 10; }
        .modal-body { padding: 35px; }
        .btn-wa {
            display: block; background: var(--whatsapp); color: white; text-align: center;
            padding: 18px; text-decoration: none; font-weight: 600; border-radius: 50px; margin-top: 25px;
        }
    </style>
</head>
<body>
